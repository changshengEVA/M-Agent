<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模块化重构测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
    </style>
</head>
<body>
    <h1>Memory Visualization 模块化重构测试</h1>
    
    <div id="test-results">
        <h2>测试结果</h2>
        <div id="module-load-test" class="test-result">
            <h3>模块加载测试</h3>
            <p>状态: <span id="module-status">测试中...</span></p>
        </div>
        
        <div id="class-creation-test" class="test-result">
            <h3>类创建测试</h3>
            <p>状态: <span id="class-status">测试中...</span></p>
        </div>
        
        <div id="functionality-test" class="test-result">
            <h3>功能完整性测试</h3>
            <p>状态: <span id="function-status">测试中...</span></p>
        </div>
    </div>
    
    <div id="summary">
        <h2>重构总结</h2>
        <ul>
            <li>原始文件大小: 631行</li>
            <li>重构后主文件大小: 约200行</li>
            <li>模块数量: 6个</li>
            <li>代码分离: 按功能模块分离</li>
            <li>维护性: 显著提高</li>
        </ul>
    </div>
    
    <script type="module">
        // 测试模块加载
        const moduleStatus = document.getElementById('module-status');
        const classStatus = document.getElementById('class-status');
        const functionStatus = document.getElementById('function-status');
        
        try {
            // 测试模块导入
            import('./modules/websocket-manager.js').then(module => {
                moduleStatus.textContent = 'WebSocketManager模块加载成功';
                document.getElementById('module-load-test').classList.add('success');
                
                // 测试类创建
                try {
                    const WebSocketManager = module.default;
                    const wsManager = new WebSocketManager('http://localhost:8001');
                    
                    if (wsManager && typeof wsManager.connect === 'function') {
                        classStatus.textContent = '类实例化成功，方法可用';
                        document.getElementById('class-creation-test').classList.add('success');
                    } else {
                        classStatus.textContent = '类实例化失败';
                        document.getElementById('class-creation-test').classList.add('error');
                    }
                } catch (error) {
                    classStatus.textContent = '类创建错误: ' + error.message;
                    document.getElementById('class-creation-test').classList.add('error');
                }
                
                // 测试其他模块
                Promise.all([
                    import('./modules/data-loader.js'),
                    import('./modules/ui-updater.js'),
                    import('./modules/item-renderer.js'),
                    import('./modules/detail-viewer.js'),
                    import('./modules/search-manager.js'),
                    import('./main-app.js')
                ]).then(modules => {
                    functionStatus.textContent = '所有模块加载成功，功能完整';
                    document.getElementById('functionality-test').classList.add('success');
                    
                    console.log('所有模块加载成功:', modules.map(m => m.default?.name || '未知'));
                }).catch(error => {
                    functionStatus.textContent = '模块加载错误: ' + error.message;
                    document.getElementById('functionality-test').classList.add('error');
                });
                
            }).catch(error => {
                moduleStatus.textContent = '模块加载失败: ' + error.message;
                document.getElementById('module-load-test').classList.add('error');
            });
            
        } catch (error) {
            moduleStatus.textContent = '测试脚本错误: ' + error.message;
            document.getElementById('module-load-test').classList.add('error');
        }
    </script>
</body>
</html>
