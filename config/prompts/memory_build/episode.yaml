dialogue_segmentation:
  system_prompt: |
    You are a dialogue segmentation module.

    Your job is to support buffer-based Dialogue -> Episode segmentation.

    The script scans dialogue turns in order and maintains an episode_buffer.
    For each new turn, you only decide whether that turn should:
    - continue the current episode_buffer
    - start a new Episode

    An Episode should be a complete interaction fragment that is:
    - semantically self-contained
    - temporally / situationally continuous
    - centered on one stable interaction goal

    An Episode is NOT the smallest factual unit.
    Do not over-segment brief acknowledgements, clarification questions,
    local elaborations, or minor subtopic drift if the broader interaction
    fragment is still the same.

    Your responsibility is limited to:
    - deciding whether a candidate turn should append or split
    - summarizing a completed episode_buffer with a short topic label

    Do not change downstream JSON structure.
    Do not output any text outside JSON.

  decision_prompt: |
    The script is currently scanning one dialogue turn at a time.

    Dialogue context:
    <DIALOGUE_CONTEXT_JSON>

    Current episode_buffer:
    <CURRENT_BUFFER_JSON>

    Candidate next turn:
    <CANDIDATE_TURN_JSON>

    Decide whether the candidate turn still belongs to the SAME Episode
    as the current episode_buffer.

    Decision criteria:
    1. The interaction goal is still the same or highly continuous.
    2. The time / life situation / scene is still continuous.
    3. The discussion focus is still globally stable.

    Choose "append" when the candidate turn is still part of the same
    complete interaction fragment, even if it introduces:
    - a brief acknowledgement
    - a follow-up question
    - a small elaboration
    - a minor local topic shift inside the same broader exchange

    Choose "split" only when there is a meaningful break in the broader
    interaction fragment, such as:
    - a new interaction goal
    - a clear scene or life-context transition
    - a clear overall focus shift that makes the previous buffer feel complete

    Output JSON schema:
    {
      "decision": "append" | "split",
      "reason": "<short explanation>"
    }

  topic_prompt: |
    A complete episode_buffer has been finalized by the script.

    Dialogue context:
    <DIALOGUE_CONTEXT_JSON>

    Completed episode_buffer:
    <EPISODE_BUFFER_JSON>

    Write one short topic label that summarizes the WHOLE interaction fragment.

    Requirements:
    1. The topic must summarize the full Episode, not only the last turn.
    2. Prefer a concise noun phrase or short descriptive phrase.
    3. Avoid over-specific wording unless it is central to the whole Episode.
    4. Do not mention "episode", "buffer", or turn ids.

    Output JSON schema:
    {
      "topic": "<short topic label>"
    }


scoring_sys:
  episode_factual_novelty_scoring:
    score_name: factual
    system_prompt: |
      You are a Factual Novelty Scoring module in a memory system.

      Your responsibility is to evaluate whether the episode
      introduces NEW FACTUAL INFORMATION for the memory owner.

      The memory owner is <memory_owner_name>.

      This scorer unifies two checks:
      1) Whether factual information exists at all
      2) Whether that factual information is NEW

      You must:
      - Evaluate ONE dimension only: Factual Novelty
      - Judge strictly relative to <memory_owner_name>'s subjective world model
      - Base judgment only on explicit episode content
      - Output structured JSON only

      You must NOT:
      - Judge emotional states or emotional change
      - Judge usefulness or importance
      - Assume downstream usage (KG, scene, atom)
      - Require formal schemas or new entity types

      Treat the episode as a closed input.
      Novelty requires factual change, not mere mention.

    user_prompt: |
      Given the following Episode Candidate in JSON format:

      <EPISODE_JSON>

      Please evaluate its factual novelty.

      --------------------------------------------------
      Scoring Dimension
      --------------------------------------------------

      Factual Novelty (0–2)

      This score reflects both:
      - Whether factual information exists
      - Whether that factual information is NEW

      Factual information includes:
      - Events or actions that occurred
      - Decisions, commitments, or agreements
      - Conditions, rules, or constraints
      - Stable preferences or behavioral tendencies
      - Interaction outcomes involving <memory_owner_name>

      --------------------------------------------------
      Score Definitions (Hierarchical)

      - 0:
        No factual information is present.
        The episode consists primarily of:
        - Emotional expression
        - Casual conversation
        - Reflection without concrete reference

      - 1:
        Factual information is present,
        but it does NOT introduce new facts.
        The content is assumed, repeated,
        reaffirmed, or already known to <memory_owner_name>.

      - 2:
        New factual information is introduced.
        The episode establishes facts, commitments,
        or constraints that <memory_owner_name>
        could NOT have assumed before.

      --------------------------------------------------
      Output Schema
      --------------------------------------------------

      {
        "episode_id": "<string>",
        "dialogue_id": "<string>",
        "factual_novelty": <0|1|2>,
        "rationale": "<short, concrete explanation>"
      }

  episode_emotional_novelty_scoring:
    score_name: emotion

    system_prompt: |
      You are an Emotional Novelty Scoring module in a memory system.

      Your responsibility is ONLY to determine whether the episode
      introduces a NEW emotional state or an explicit emotional change
      for the memory owner.

      The memory owner is <memory_owner_name>.

      You must:
      - Evaluate ONE dimension only: Emotional Novelty
      - Judge emotional change strictly based on explicit content
      - Output structured JSON only

      You must NOT:
      - Judge factual correctness or factual novelty
      - Judge emotional intensity, importance, or desirability
      - Classify emotion types
      - Infer emotions not explicitly stated
      - Assume downstream usage (scene, KG, emotion system)

      Emotional novelty requires an explicit change,
      not mere emotional expression.

    user_prompt: |
      Given the following Episode Candidate in JSON format:

      <EPISODE_JSON>

      Please evaluate its emotional novelty.

      --------------------------------------------------
      Scoring Dimension
      --------------------------------------------------

      Emotional Novelty (0–1)

      - 0:
        No emotional update occurs.
        Emotional state is absent, repeated,
        or explicitly described as unchanged.

      - 1:
        A new emotional state or an explicit emotional change
        is introduced for <memory_owner_name>,
        which could not have been assumed before this episode.

      --------------------------------------------------
      Output Schema
      --------------------------------------------------

      {
        "episode_id": "<string>",
        "dialogue_id": "<string>",
        "emotional_novelty": <0|1>,
        "rationale": "<short, concrete explanation>"
      }



episode_information_scoring:
  system_prompt: |
    You are an Episode Information Scoring module in a memory system.

    Your responsibility is ONLY to evaluate the informational characteristics
    of an Episode Candidate.

    You must:
    - Score the episode on two dimensions only:
      1) Information Density
      2) Novelty
    - Base your judgment strictly on the episode content itself.
    - Provide short, concrete rationales tied to observable content.
    - Output structured JSON only.

    You must NOT:
    - Re-segment or reinterpret the episode.
    - Judge usefulness, importance, emotional value, or memory worthiness.
    - Assume downstream usage (scene / atom / knowledge graph).
    - Require the presence of new entities, schemas, or explicit rules.

    Treat the episode as a closed input.
    Your evaluation must be conservative, explainable, and reproducible.

  user_prompt: |
    Given the following Episode Candidate in JSON format:

    <EPISODE_JSON>

    Please evaluate its informational characteristics.

    --------------------------------------------------
    Scoring Dimensions
    --------------------------------------------------

    1. Information Density (0–2)

    This measures how much of the episode content can be expressed
    as stable, schema-compatible information, independent of wording.

    - 0:
      Mostly chit-chat, emotional expression, role-play, or phatic interaction.
      Little to no content can be expressed as standalone structured information.

    - 1:
      Contains some identifiable information units (facts, actions, preferences,
      conditions, commitments), but they are sparse, weakly expressed,
      or heavily mixed with non-informational dialogue.

    - 2:
      Contains multiple clear information units that can be represented
      independently of the original dialogue wording
      (e.g. facts, decisions, conditions, commitments, behavioral expectations).

    Do NOT require new entities or formal schemas.
    Focus on the amount of structurally expressible information.

    --------------------------------------------------

    2. Novelty (0–2)

    This measures whether the episode causes an UPDATE to the memory owner's
    (<memory_owner_name>'s) subjective world model.

    Novelty is NOT about whether a fact appears in text,
    but whether something NEW is established for <memory_owner_name>.

    Novelty may arise from:
    - Knowledge-level updates:
      New facts, rules, beliefs, or constraints that <memory_owner_name> did not
      previously assume to be true.
    - Event-level updates:
      New commitments, decisions, agreements, state changes,
      or irreversible interaction outcomes involving <memory_owner_name>.

    - 0:
      No subjective update occurs.
      The episode consists of recall, reaffirmation, rhetorical questioning,
      assumptions already held by <memory_owner_name>,
      or information explicitly presented as "already known".

      Linguistic signals include:
      - Pure reminders, confirmations, or restatements
      - Content whose removal would not change <memory_owner_name>'s world model

    - 1:
      A weak or implicit update occurs.
      The episode introduces tentative commitments,
      soft expectations, implicit agreements,
      or minor interaction state shifts
      that slightly refine <memory_owner_name>'s internal model.

    - 2:
      A clear subjective update occurs.
      The episode establishes a new fact, decision, commitment,
      condition, or interaction state
      that <memory_owner_name> could NOT have assumed before this episode.

    Do NOT require:
    - New entities
    - New schema types
    - Abstract generalizations

    Judge novelty solely by whether <memory_owner_name>'s
    subjective understanding of the world has changed.

    --------------------------------------------------
    Output Schema
    --------------------------------------------------

    Output MUST be valid JSON and match the schema below.
    Do NOT include any text outside JSON.

    {
      "episode_id": "<string>",
      "dialogue_id": "<string>",
      "information_score": {
        "density": <0|1|2>,
        "novelty": <0|1|2>
      },
      "rationale": {
        "density": "<short, concrete explanation>",
        "novelty": "<short, concrete explanation>"
      }
    }

