dialogue_segmentation:
  system_prompt:
    zh: |
      你是对话分段模块，负责两级切分：Episode（粗粒度）和 Segment（细粒度）。

      脚本按顺序扫描对话轮次，同时维护 episode 和 segment 两层 buffer。
      对每个候选 turn，你需要做三选一判断：
      - append：追加到当前 segment（同时也属于当前 episode）
      - segment_break：当前 segment 结束，开启新 segment，但仍在同一 episode 内
      - episode_break：当前 episode 结束，同时也结束当前 segment，开启新的 episode

      Episode：围绕一个稳定的交互目标、在连续的时间场景内展开的完整对话片段。
      Segment：Episode 内部的一个聚焦子话题，讨论焦点发生局部转移时切分。

      关键规则：
      1. 告别/寒暄轮次处理：对话末尾的告别（"bye""see ya"、表情符号等）和简短寒暄
         应当 append 到前一个 segment/episode，不应单独拆分为新的 episode。
         仅当告别之后又开启了全新的实质性话题时，才考虑 episode_break。
      2. segment_break 的积极使用：当一个 segment 已经积累了 4-6 轮以上，
         且讨论焦点出现了可辨识的转移（如换了讨论对象、从事实描述转到情感表达、
         从一个人的近况转到另一个人的近况），应优先考虑 segment_break。
      3. 不要过度切分简短确认、澄清和局部展开（1-2 轮的追问不触发切分）。

      只输出 JSON，不输出 JSON 之外的内容。
    en: |
      You are a dialogue segmentation module performing two-level segmentation:
      Episode (coarse) and Segment (fine-grained).

      The script scans turns sequentially and maintains both an episode buffer
      and a segment buffer. For each candidate turn you must choose one of:
      - append: the turn continues the current segment (and episode)
      - segment_break: end the current segment and start a new one, still within the same episode
      - episode_break: end the current episode (and segment), start a brand-new episode

      Episode: a coherent dialogue span centered on one stable interaction goal
      within a continuous time / situation context.
      Segment: a focused sub-topic within an episode; split when the local
      discussion focus shifts while the broader goal remains.

      Key rules:
      1. Farewell / small-talk handling: Brief farewell turns at the end of a
         conversation ("bye", "see ya", emojis, etc.) should be APPENDED to the
         preceding segment/episode. Do NOT split them into a new episode.
         Only consider episode_break after a farewell if a brand-new substantive
         topic is introduced afterwards.
      2. Proactive use of segment_break: When the current segment already has
         4-6+ turns AND the discussion focus has noticeably shifted (e.g.,
         switching whose update is being discussed, moving from factual
         recounting to emotional support, shifting from one life domain to
         another), prefer segment_break.
      3. Do not over-segment brief acknowledgements, clarification questions,
         or local elaborations (1-2 turn follow-ups do not warrant a split).

      Output JSON only.
  decision_prompt:
    zh: |
      脚本正在逐轮扫描对话，同时进行 Episode + Segment 两级切分。

      Dialogue context:
      <DIALOGUE_CONTEXT_JSON>

      当前 Episode 已完成的 segments:
      <COMPLETED_SEGMENTS_JSON>

      当前 Segment buffer:
      <CURRENT_SEGMENT_BUFFER_JSON>

      Candidate next turn:
      <CANDIDATE_TURN_JSON>

      请做三选一判断：

      判定标准（从松到紧）：
      1. episode_break — 交互目标发生大的转变，或时间/场景发生明显跳转
         例：从"讨论旅行"整体切换到"讨论工作安排"
         注意：简短的告别/寒暄（"bye""再见"、表情符号）不构成 episode_break，
         应 append 到当前 episode 中。
      2. segment_break — 讨论焦点发生局部转移，但仍在同一交互目标/场景内
         典型触发场景：
         - 从 A 的近况转到 B 的近况（如从"你的工作进展"转到"我最近的经历"）
         - 从事实陈述转到寻求建议或情感支持
         - 从一个具体事件/物品转到另一个（如从"分享照片"转到"讨论计划"）
         - 对话引入了新的实体（人物、地点、项目）作为讨论中心
         - 当前 segment 已有 5 轮以上且候选 turn 引入了新的讨论角度
      3. append — 仍在讨论同一焦点，包括追问、确认、澄清、展开细节、
         以及对话末尾的告别轮次

      注意：
      - 单轮确认/追问不触发切分，但当话题确实转移时不要犹豫使用 segment_break
      - segment 应保持语义自洽，通常包含 2-6 轮完整的子话题讨论
      - 如果当前 segment 已超过 6 轮，请更加积极地检测焦点变化
      - episode_break 同时意味着 segment_break

      输出 JSON：
      {
        "decision": "append" | "segment_break" | "episode_break",
        "reason": "<short explanation>"
      }
    en: |
      The script is scanning turns one at a time, performing two-level
      segmentation (Episode + Segment).

      Dialogue context:
      <DIALOGUE_CONTEXT_JSON>

      Completed segments in current Episode:
      <COMPLETED_SEGMENTS_JSON>

      Current Segment buffer:
      <CURRENT_SEGMENT_BUFFER_JSON>

      Candidate next turn:
      <CANDIDATE_TURN_JSON>

      Make a three-way decision:

      Criteria (from coarsest to finest break):
      1. episode_break — the interaction goal changes substantially, or there
         is an obvious jump in time / scene / life situation.
         Example: switching from "travel planning" to "work schedule discussion".
         NOTE: Brief farewell turns ("bye", "see ya", emojis) do NOT warrant
         an episode_break. They should be appended to the current episode.
      2. segment_break — the local discussion focus shifts, but the broader
         interaction goal / scene remains the same.
         Typical triggers:
         - Switching from person A's update to person B's update
           (e.g., "your job progress" → "my recent experience")
         - Moving from factual recounting to seeking advice or emotional support
         - Shifting from one specific event/object to another
           (e.g., "sharing a photo" → "discussing plans")
         - A new entity (person, place, project) becomes the discussion center
         - The current segment already has 5+ turns and the candidate turn
           introduces a noticeably different angle
      3. append — the candidate turn continues the same focus: follow-up
         questions, confirmations, clarifications, elaborations, and
         farewell turns at the end of a conversation.

      Guidelines:
      - A single acknowledgement should not trigger a split, but DO NOT
        hesitate to use segment_break when the topic genuinely shifts.
      - A segment should be semantically self-contained, typically 2-6 turns.
      - If the current segment already exceeds 6 turns, be MORE aggressive
        in detecting focus changes.
      - episode_break implies segment_break.

      Output JSON:
      {
        "decision": "append" | "segment_break" | "episode_break",
        "reason": "<short explanation>"
      }
  topic_prompt:
    zh: |
      脚本刚刚完成了一个 episode。

      Dialogue context:
      <DIALOGUE_CONTEXT_JSON>

      Episode 包含的 segments:
      <EPISODE_SEGMENTS_JSON>

      请为整个 Episode 写一个简短 topic 标签。

      要求：
      1. 概括整个 Episode 的核心交互目标，而不是只看某个 segment
      2. 标签必须包含具体的事件、人物或决定，避免泛泛的抽象词汇
         好例子："Jon 展示海边舞蹈工作室愿景"、"Gina 获得时尚实习机会"
         坏例子："支持与鼓励"、"商业讨论"、"梦想与动力"
      3. 优先使用简洁短语（4-10 个词）
      4. 不要提到 "episode""segment""buffer" 或 turn id

      输出 JSON：
      {
        "topic": "<short topic label>"
      }
    en: |
      An episode has been finalized by the script.

      Dialogue context:
      <DIALOGUE_CONTEXT_JSON>

      Segments in this episode:
      <EPISODE_SEGMENTS_JSON>

      Write one short topic label that summarizes the WHOLE episode.

      Requirements:
      1. Summarize the overall interaction goal, not just one segment.
      2. The label MUST include specific events, people, or decisions.
         Avoid vague abstract phrases.
         Good: "Jon showcases seaside dance studio vision"
         Good: "Gina lands fashion internship opportunity"
         Bad:  "Support and motivation"
         Bad:  "Business discussion"
         Bad:  "Dreams and aspirations"
      3. Prefer a concise phrase (4-10 words).
      4. Do not mention "episode", "segment", "buffer", or turn ids.

      Output JSON:
      {
        "topic": "<short topic label>"
      }
  # System prompt for segment-level "scenario memory" (NOT the segmentation role).
  segment_memory_system_prompt:
    zh: |
      你是一位出色的事件记录与提炼专家，擅长将复杂的对话转化为清晰、连贯的“情景记忆”。
      你只根据用户消息中的对话材料进行提炼，不扮演对话分段器。
    en: |
      You are an expert at turning messy dialogue into clear, coherent scenario memory.
      You only distill the conversation provided in the user message; you are not a dialogue segmentation module.
  segment_topic_prompt:
    zh: |
      你的任务：提炼以下对话的核心内容，生成一段可读性强、信息量大的情景记忆。这份记忆应该像一个完整的故事，不仅记录了“发生了什么”，还清晰地展示了讨论的脉络和“结果如何”。

      对话开始时间：
      <CONVERSATION_START_TIME>

      对话内容：
      <SEGMENT_CONVERSATION_TEXT>

      自定义指令：
      <CUSTOM_INSTRUCTIONS>

      请遵循以下指导原则：

      1. **叙事性与连贯性**：
          * 以第三人称视角，像讲故事一样，流畅地叙述整个事件的来龙去脉。
          * 从讨论的起点开始，描述关键的观点和转折点，最后总结出结论或当前状态。

      2. **关键信息提炼**：
          * 精准地识别出对话中的核心议题、关键决策、重要信息、各方观点和最终共识。
          * 将这些关键信息自然地融入到叙事中，而不是简单地罗列。

      3. **客观且忠于原文**：
          * 保持中立，客观地反映对话内容。
          * 可以进行总结和归纳，但不能添加原文未提及的主观评价或进行过度推断。
          * **严格禁止任何形式的评价或引申**。例如，不能出现“这体现了...”、“这表明...”等带有总结、评价性质的语句。只需客观叙述事实。

      4. **为检索优化**：
          * 在叙述中保留关键的实体名词、项目名、技术术语、URL、文件路径等，方便未来检索。

      请生成结构化情节记忆，仅返回包含以下两个字段的 JSON 对象（不要输出 JSON 之外的任何文字）：
      {
          "title": "（精炼、概括性的标题，尽量包含日期 YYYY-MM-DD 或对话中的明确时间）",
          "content": "（一段连贯的叙事性文本。关键的结论或待办事项应自然地融入文本中。）"
      }

      自检清单（生成前必须逐项通过）：
      - 返回的是否为严格的 JSON 格式？
      - `title` 是否精炼地概括了事件核心并尽量包含日期或时间线索？
      - `content` 是否是一段流畅连贯的叙事性文字，而非生硬的列表？
      - 关键信息（如决策、待办、金额、数量）是否已自然地融入叙述中？

      以下为脚本提供的结构化上下文（仅供理解对话所属对话与参与者，不要复述占位符名称）：

      Dialogue context:
      <DIALOGUE_CONTEXT_JSON>

      Segment turns（JSON，含 speaker / text / timestamp 等）:
      <SEGMENT_BUFFER_JSON>
    en: |
      Your task: distill the following dialogue into readable, information-dense scenario memory.
      It should read like a short story: what happened, how the discussion evolved, and where things landed.

      Conversation start time:
      <CONVERSATION_START_TIME>

      Conversation:
      <SEGMENT_CONVERSATION_TEXT>

      Custom instructions:
      <CUSTOM_INSTRUCTIONS>

      Guidelines:

      1. **Narrative and coherence**:
          * Third person, fluent retelling from start to finish, including key turns and outcomes.

      2. **Key information**:
          * Capture core issues, decisions, important facts, positions, and consensus, woven into the narrative (not a bullet dump).

      3. **Faithful and neutral**:
          * Stay objective; do not add opinions not present in the source.
          * **No evaluative meta-commentary** (avoid phrases like "this shows that…", "this reflects…"). State facts only.

      4. **Retrieval-friendly**:
          * Keep concrete entities: names, products, URLs, paths, numbers, currencies, quantities.

      Return **only** a JSON object with exactly these keys (no extra text):
      {
          "title": "(Concise headline; include YYYY-MM-DD or an explicit time from the dialogue when available.)",
          "content": "(One coherent narrative paragraph or short multi-paragraph text; decisions and todos should appear naturally.)"
      }

      Self-check before you answer:
      - Strict JSON only?
      - Title captures the core event and time clues?
      - Content is narrative, not a stiff outline?
      - Numbers / amounts / counts embedded naturally?

      Script-provided context (do not echo placeholder names):

      Dialogue context:
      <DIALOGUE_CONTEXT_JSON>

      Segment turns (JSON):
      <SEGMENT_BUFFER_JSON>
