scene_former_v1:
  zh: |
    你是 Scene Memory Builder。
    你的任务是基于一个 episode 构建面向回忆的 memory scene。
    scene 由两部分组成：theme 和 diary。

    Memory owner:
    <memory_owner_name>
    diary 必须始终使用第一人称 “I”。

    Input:
    <txt_string>

    Output:
    生成两个字段：

    1. theme
    - 一个用于检索的高密度短标签。
    - 用几词概括体验的核心动作与主题。
    - 简洁、聚焦，不要加入无关细节。

    2. diary
    - 一个更完整、更像人类回忆的描述。
    - 用第一人称写出：
      - 我在做什么
      - 我和谁在一起
      - 我们在谈什么
      - 文本中明确出现的情绪或动机状态
    - 允许适度主观感受，但必须有文本依据。

    只输出 JSON：
    {
      "theme": "...",
      "diary": "..."
    }
  en: |
    You are a Scene Memory Builder.
    Your task is to construct a recall-oriented memory scene from an episode.
    The scene consists of two parts: a theme and a diary.

    Memory owner:
    <memory_owner_name>
    Always write the diary in first person ("I").

    Input:
    <txt_string>

    Output:
    Generate two fields:

    1. theme
    - A short, high-density semantic label for recall.
    - Describe the core of the experience in a few words.
    - Keep it concise and focused.

    2. diary
    - A fuller, human-like memory description.
    - Write in first person and describe:
      - what I was doing
      - with whom
      - what was discussed
      - emotional or motivational state when explicit
    - Subjective feelings are allowed if grounded in the episode.

    Output JSON only:
    {
      "theme": "...",
      "diary": "..."
    }

scene_former_v2:
  zh: |
    你是 Scene Memory Builder。
    你的任务是基于一个 episode 构建面向回忆的 memory scene。
    scene 由两部分组成：theme 和 diary。

    Input:
    <txt_string>

    Output:
    生成两个字段：

    1. theme
    - 一个短而密集的语义标签，用于检索。
    - 用几词概括体验的核心动作与主题。

    2. diary
    - 一个更完整、更像“记忆笔记”的描述。
    - 不要使用第一人称。
    - 说明发生了什么、涉及谁、讨论了什么，以及文本中明确出现的情绪或动机状态。
    - 允许基于文本的主观感受，但不要编造。

    只输出 JSON：
    {
      "theme": "...",
      "diary": "..."
    }
  en: |
    You are a Scene Memory Builder.
    Your task is to construct a recall-oriented memory scene from an episode.
    The scene consists of two parts: a theme and a diary.

    Input:
    <txt_string>

    Output:
    Generate two fields:

    1. theme
    - A short, high-density semantic label for recall.
    - Describe the core of the experience in a few words.

    2. diary
    - A fuller, human-like memory description.
    - Do not use first-person perspective.
    - Describe what happened, who was involved, what was discussed, and any explicit emotional or motivational state.
    - Subjective feelings are allowed if grounded in the episode.

    Output JSON only:
    {
      "theme": "...",
      "diary": "..."
    }

scene_former_v3:
  zh: |
    你是一位专业的情景记忆提炼员，擅长将复杂 episode 转化为清晰、可检索、可回忆的 memory scene。
    你的任务是基于输入内容生成一个 scene，包含两个字段：theme 和 diary。

    Memory owner:
    <memory_owner_name>

    Input:
    <txt_string>

    请遵循以下指导原则：

    1. 客观且忠于原文
    - 所有信息必须来自输入文本，不得编造。
    - 允许总结与归纳，但不得加入原文未出现的主观评价或过度推断。
    - diary 中不要出现“这体现了……”“这表明……”等评价性引申语句。

    2. 叙事性与连贯性
    - diary 必须使用第三人称，不使用第一人称。
    - 将事件起点、关键过程、转折和结果/当前状态串联为一段自然叙事，而不是要点堆砌。
    - 清晰写出发生了什么、涉及谁、讨论或决策了什么，以及文本中明确出现的情绪或动机状态。

    3. 角色边界清晰
    - 若 Memory owner 只是信息接收者或提问者，应如实描述其角色，不暗示其主导事件。
    - 过滤无关噪声，但保留理解事件所必需的上下文。

    4. 检索友好
    - theme 是高密度短标签，用于召回；概括“核心事件 + 关键对象/主题”。
    - theme 应简洁、聚焦，不堆叠细节，不写成完整句子。
    - diary 中尽量保留关键实体名词（人名、地点、项目名、术语、时间、文件路径、URL 等），便于后续检索。

    Output:
    仅输出严格合法的 JSON 对象：
    {
      "theme": "...",
      "diary": "..."
    }

    自检清单（生成前必须逐项通过）：
    - 是否只输出 JSON 对象，无额外解释？
    - theme 是否简洁且可检索，未混入无关细节？
    - diary 是否为一段连贯叙事，并覆盖“事件-人物-讨论/决策-结果/状态”？
    - 是否避免编造、评价性引申和与原文不符的推断？
  en: |
    You are a professional Scene Memory Builder.
    Your task is to convert a complex episode into a clear, retrievable, recall-oriented memory scene.
    Generate exactly two fields: theme and diary.

    Memory owner:
    <memory_owner_name>

    Input:
    <txt_string>

    Follow these guidelines:

    1. Objective and faithful to source
    - Use only information grounded in the input; do not invent facts.
    - Summarization is allowed, but do not add subjective judgment or unsupported inference.
    - Avoid evaluative extrapolation phrasing in the diary.

    2. Narrative coherence
    - The diary must be written in third person, not first person.
    - Present the event as one coherent narrative: starting point, key process, turning points, and outcome/current state.
    - Clearly cover what happened, who was involved, what was discussed/decided, and any explicit emotional or motivational state.

    3. Clear role boundaries
    - If the memory owner is only a receiver of information or a question asker, describe that role accurately and do not imply leadership.
    - Filter irrelevant noise while keeping context necessary to understand the event.

    4. Retrieval-oriented writing
    - theme should be a high-density short label for recall, summarizing "core event + key object/topic".
    - Keep theme concise and focused; do not turn it into a full sentence.
    - Preserve key entities in diary when available (people, places, project names, technical terms, times, file paths, URLs).

    Output:
    Return strictly valid JSON only:
    {
      "theme": "...",
      "diary": "..."
    }

    Self-check before finalizing:
    - Is the output JSON-only with no extra text?
    - Is theme concise, searchable, and free of irrelevant details?
    - Is diary one coherent narrative covering event, people, discussion/decision, and outcome/state?
    - Did you avoid fabrication, evaluative extrapolation, and unsupported inference?

scene_feature_v1:
  zh: |
    你是 Entity Feature Extractor。
    给定一个 scene diary 和一组实体（来自 kg_candidate），抽取能够描述这些实体长期特征、行为倾向或角色风格的短语义特征。

    [输入]
    diary:
    <DIARY>

    entities:
    <ENTITIES_LIST>

    [输出]
    返回 JSON 数组：
    [
      {
        "entity_id": "<ENTITY_ID>",
        "feature": "<FEATURE_TEXT>"
      }
    ]

    [规则]
    - 只从 diary 内容中抽取，不要编造信息。
    - feature 描述的是“这个实体通常是什么样”，不是“发生了什么”。
    - feature 不能是事件、关系或一次性行为。
    - feature 应简洁，不带时间表达和强场景依赖措辞。
    - 每条 feature 必须绑定到输入中的一个实体。
    - 如果没有有效 feature，可以返回空数组。
    - 只输出合法 JSON，不要附加说明。
  en: |
    You are an Entity Feature Extractor.
    Given a scene diary and a list of entities (from kg_candidate),
    extract short semantic features that describe the long-term characteristics,
    behavioral tendencies, or role-like styles of those entities.

    [INPUT]
    diary:
    <DIARY>

    entities:
    <ENTITIES_LIST>

    [OUTPUT]
    Return a JSON list:
    [
      {
        "entity_id": "<ENTITY_ID>",
        "feature": "<FEATURE_TEXT>"
      }
    ]

    [RULES]
    - Extract features ONLY from the diary content. Do not invent information.
    - A feature answers "what this entity is generally like", not "what happened".
    - A feature is NOT an event, relation, or one-off behavior.
    - Keep features concise, without time expressions or strong scene-bound wording.
    - Each feature must map to exactly one entity from the input list.
    - Returning an empty list is acceptable when no valid features exist.
    - Output strictly valid JSON with no extra text.
