# Unified LoCoMo test environment config
# Used by:
# - python scripts/run_locomo/import_locomo.py --env-config config/eval/memory_agent/locomo/test_env.yaml
# - python scripts/run_locomo/eval_locomo.py   --env-config config/eval/memory_agent/locomo/test_env.yaml

name: locomo_test_env
description: Build/evaluate with explicit conv_id scope to avoid mixed-memory contamination.

data:
  file: data/locomo/data/locomo10.json
  loader_type: locomo

selection:
  # Option A: evaluate full QA set inside selected conversations.
  conv_ids:
    - conv-30
  # Option B: evaluate only specific questions (sample_id + qa_indices).
  # If Option B is provided, conv_ids will be auto-expanded with sample_id values below.
  # questions:
  #   - sample_id: conv-30
  #     qa_indices: [3, 24, 36]

import:
  process_id: test_facts_only
  # Clean data/memory/<process_id>/dialogues + episodes before rebuild.
  clean_output: true
  enable_episode_scoring_filter: false

eval:
  test_id: rebuild_test_facts_only
  memory_agent_config: config/agents/memory/locomo_eval_memory_agent.yaml
  model_key: memory_agent
  prediction_key: memory_agent_prediction
  thread_id_prefix: locomo-eval
  overwrite: true
  sample_fraction: 1.0
  sample_seed: 42
  max_samples: 0
  max_questions: 0
  save_every: 1
  sleep_seconds: 0.0
