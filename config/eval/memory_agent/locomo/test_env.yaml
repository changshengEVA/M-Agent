# Unified LoCoMo test environment config
# Used by:
#   python scripts/run_locomo/import_locomo.py   --env-config config/eval/memory_agent/locomo/test_env.yaml
#   python scripts/run_locomo/warmup_locomo.py   --env-config config/eval/memory_agent/locomo/test_env.yaml
#   python scripts/run_locomo/eval_locomo.py    --env-config config/eval/memory_agent/locomo/test_env.yaml
#   python scripts/run_locomo/run_locomo_pipeline.py --env-config config/eval/memory_agent/locomo/test_env.yaml --batch --test-id-suffix

name: locomo_test_env
description: Build/evaluate with explicit conv_id scope to avoid mixed-memory contamination.

# --- Shared: data source (import + eval both need the same LoCoMo JSON) ---
data:
  file: data/locomo/data/locomo10.json
  loader_type: locomo

# --- Shared: which conversations / QA subset to target ---
selection:
  # Option A: full QA set inside these conversations (import filters; eval filters samples).
  conv_ids:
    - conv-50
    - conv-26
    - conv-30
    - conv-41
    - conv-42
    - conv-43
    - conv-44
    - conv-47
    - conv-48
    - conv-49
  # Option B: only specific questions. If set, sample_id values are auto-merged into conv scope.
  # questions:
  #   - sample_id: conv-30
  #     qa_indices: [3, 24, 36]

# --- import: build dialogues + episodes under data/memory/<process_id>/ ---
import:
  process_id: baseline
  # Remove existing dialogues/ + episodes/ under this process_id before rebuild.
  clean_output: true
  # Parallel episode segmentation: multiple dialogue files in parallel (ThreadPoolExecutor).
  # 1 = same as legacy sequential. Raise with care (LLM / API rate limits).
  episode_max_workers: 3

# --- warmup: scene + atomic facts from episodes (reads paths via eval.memory_agent_config → MemoryCore workflow_id) ---
warmup:
  # Parallel scene generation: multiple episode JSON files (by_dialogue) in parallel.
  scene_max_workers: 3
  # Parallel scene fact extraction: multiple scene JSON files in parallel.
  scene_fact_max_workers: 3
  # If true, same as CLI --force (delete existing scene dir when regenerating).
  force: true

# --- eval: run_eval_locomo / MemoryAgent QA ---
eval:
  test_id: new_baseline
  memory_agent_config: config/agents/memory/locomo_eval_memory_agent.yaml
  model_key: memory_agent
  prediction_key: memory_agent_prediction
  thread_id_prefix: locomo-eval
  overwrite: true
  sample_fraction: 1.0
  sample_seed: 42
  max_samples: 0
  max_questions: 0
  save_every: 1
  sleep_seconds: 0.0
  # Per-question recall JSON under log/<test_id>/<recall_dir>/ (same idea as LongMemEval).
  recall_dir: recall
  # LLM judge (evaluate_agent_qa_llm_judge.py --env-config this file): skip category 5 like run_eval_locomo.
  # Set false if you want the judge to score category-5 questions too.
  llm_judge_exclude_category_5: true
