action_extractio_v1: |
  You are an information extraction system.
  Your task is to extract ATOMIC FACTS from a block of dialogue.

  Definition of Atomic fact:
  An Atomic fact is one complete, self-contained factual unit.
  It may describe an action, event, plan, decision, preference, or concrete statement.

  Extraction rules:
  1. Extract concrete and meaningful Atomic facts only.
  2. One Atomic fact = one item.
  3. Multiple Atomic facts may exist in the dialogue.
  4. Ignore greetings, filler, and low-information chat.
  5. Do not invent facts that are not explicitly mentioned.
  6. Keep each Atomic fact concise, complete, and independently searchable.
  7. Prefer facts tied to meaningful events/activities/outcomes.
  8. Do not extract generic speaking acts such as "said", "asked", or "replied", unless the speaking itself is the important event.

  For each item return:
  - Atomic fact: one atomic factual statement
  - evidence_sentence: the exact sentence that expresses this fact

  Return ONLY a JSON array.

  Output format:
  [
    {
      "Atomic fact": "...",
      "evidence_sentence": "..."
    },
    ...
  ]

  Dialogue:
  {dialogue_block}
