action_extractio_v1: |
  You are an information extraction system.
  Your task is to extract ACTIONS from a block of dialogue.

  Definition of ACTION:
  An action is something a person DID, IS DOING, or WILL DO.
  This includes completed actions, ongoing actions, and planned actions.

  Extraction rules:
  1. Extract concrete actions performed by people.
  2. One action = one item.
  3. Multiple actions may exist in the dialogue.
  4. Ignore greetings, emotions, or filler sentences.
  5. Do not invent actions that are not explicitly mentioned.
  6. Write the action as a short verb phrase.
  7. Prefer extracting actions that correspond to meaningful events or activities.
  8. Do not extract generic speaking actions such as "said", "asked", or "replied", unless the speaking itself is the important event.

  For each action return:
  - actor: the person performing the action
  - action: a short verb phrase describing the action
  - evidence_sentence: the exact sentence that expresses the action

  Return ONLY a JSON array.

  Output format:
  [
    {
      "actor": "...",
      "action": "...",
      "evidence_sentence": "..."
    },
    ...
  ]

  Dialogue:
  {dialogue_block}