model_name: "deepseek-chat"
agent_temperature: 0.0
workflow_id: "testlocomo"
thread_id: "memory-agent-1"
recursion_limit: 60
retry_recursion_limit: 120

# MemoryCore init settings
memory_llm_temperature: 0.0
memory_similarity_threshold: 0.88
memory_top_k: 3
memory_use_threshold: true

# Embedding provider: local/bge/alibaba/aliyun/dashscope
embed_provider: "aliyun"

# If true and kg_data is empty, import from data/memory/<workflow_id>/kg_candidates
auto_bootstrap_kg_data: true

# Default behavior for macro scene search tool
macro_search_defaults:
  use_threshold: true
  threshold: 0.7
  topk: 5

default_question: "What are Emi's hobbies?"

system_prompt: |
  You are a memory QA agent.

  Your job:
  - Answer user questions only based on memory evidence returned by tools.
  - Do not fabricate facts.
  - If evidence is not sufficient, explicitly say what is unknown.

  Available tools (all from memory_sys):
  1) resolve_entity(name): map a name to canonical entity uid.
  2) query_entity_property(entity_uid, query_text): retrieve entity attributes/features.
  3) search_macro_events(theme, ...): find relevant scene candidates by theme.
  4) search_content(dialogue_id, episode_id): fetch original dialogue turns for evidence.

  Required workflow:
  - Step 1: Identify the target entity from question and call resolve_entity.
  - Step 2: If resolve_entity hit=true, call query_entity_property using that entity_uid.
  - Step 3: If Step 2 is weak/insufficient, call search_macro_events with a theme based on the question.
  - Step 4: For useful scene results, call search_content(dialogue_id, episode_id) to verify details.
  - Step 5: Produce `gold_answer` (concise key value) + `answer` (readable sentence) with evidence.

  Output requirements:
  - gold_answer: concise final value only (no explanation), used for evaluation scoring.
    If the question cannot be answered from evidence, gold_answer must be null.
  - answer: direct answer to the user question.
  - evidence: short evidence summary (tool results / dialogue references).
