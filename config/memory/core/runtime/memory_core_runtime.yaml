extract_fact_entities:
  fact_entity_prompt:
    zh: |
      你是信息抽取系统。

      给定一句话，请抽取：
      1. 主实体（被描述其状态/动作的主语）
      2. 其他被提到的实体（如果有）

      规则：
      - 主实体应是语法主语。
      - 返回规范名称，不要用代词。
      - 如果是所属结构（例如 “Audrey's dogs”），主实体应为 Audrey。

      输出 JSON：
      {
        "main_entity": "...",
        "other_entities": ["...", "..."]
      }

      只返回 JSON。

      句子：
      <sentence>
    en: |
      You are an information extraction system.

      Given a sentence, extract:
      1. The main entity (the subject whose state/action is described)
      2. Other mentioned entities (if any)

      Rules:
      - The main entity is the grammatical subject.
      - Return a canonical name (no pronouns).
      - If possessive (e.g., "Audrey's dogs"), main entity is Audrey.

      Output JSON:
      {
        "main_entity": "...",
        "other_entities": ["...", "..."]
      }

      Return JSON only.

      Sentence:
      <sentence>

entity_search:
  llm_candidate_judge_prompt:
    zh: |
      你是实体指代判定器。
      给定用户查询和召回出的实体候选，请判断该查询是否真正命中某个已有实体。
      要严格，避免过度匹配。

      QUERY:
      <query>

      CANDIDATES:
      <candidate_lines>

      只输出 JSON：
      {"decision":"HIT"|"MISS","entity_id":"<candidate id or empty>","match_rank":<int or null>,"confidence":<0~1>,"reason":"..."}

      规则：
      - 只有当查询明确指向一个候选时才返回 HIT。
      - `entity_id` 必须来自候选列表。
      - 如果不确定，返回 MISS。
    en: |
      You are an entity-grounding judge.
      Given a user query and recalled entity candidates, decide whether the query truly hits an existing entity.
      Be strict and avoid over-matching.

      QUERY:
      <query>

      CANDIDATES:
      <candidate_lines>

      Output JSON only:
      {"decision":"HIT"|"MISS","entity_id":"<candidate id or empty>","match_rank":<int or null>,"confidence":<0~1>,"reason":"..."}

      Rules:
      - HIT only when the query clearly refers to one candidate.
      - `entity_id` must come from the candidate list.
      - If uncertain, return MISS.

entity_profile_merge:
  attribute_dedup_prompt:
    zh: |
      你是实体属性去重的严格判定器。
      判断 CANDIDATE 是否与 EXISTING 中某一项表达了相同的 FIELD 语义。
      即使内容不同，只要字段语义相同，也应该合并。

      CANDIDATE:
      field=<candidate_field>, match_field=<candidate_match_field>, content=<candidate_content>, text=<candidate_text>

      EXISTING:
      <candidate_lines>

      只输出 JSON，结构如下：
      {"decision":"SAME"|"NEW","match_idx":<int or null>}

      规则：
      - 只要字段语义相同（例如 like / likes / preference），即使内容不同也应判为 SAME。
      - 如果不确定，返回 NEW。
    en: |
      You are a strict deduplication judge for entity attributes.
      Decide if CANDIDATE expresses the same FIELD semantic as one of EXISTING entries.
      Content can differ and should be merged when the field semantic is the same.

      CANDIDATE:
      field=<candidate_field>, match_field=<candidate_match_field>, content=<candidate_content>, text=<candidate_text>

      EXISTING:
      <candidate_lines>

      Output JSON only with this schema:
      {"decision":"SAME"|"NEW","match_idx":<int or null>}

      Rules:
      - SAME when field semantics are the same (e.g. like / likes / preference), even if content differs.
      - If uncertain, return NEW.
  event_dedup_prompt:
    zh: |
      你是实体事件去重的严格判定器。
      判断 CANDIDATE 事件是否与 EXISTING 中某一项属于同一个事件语义。
      时间信息本身不应该强行导致 NEW，只要事件本体相同即可视为 SAME。

      CANDIDATE:
      <candidate_text>

      EXISTING:
      <candidate_lines>

      只输出 JSON，结构如下：
      {"decision":"SAME"|"NEW","match_idx":<int or null>}

      规则：
      - 只要核心事件语义匹配，就返回 SAME。
      - 如果不确定，返回 NEW。
    en: |
      You are a strict deduplication judge for entity events.
      Decide if the CANDIDATE event is the same event type as one of EXISTING entries.
      Time information should NOT force NEW when the event itself is the same.

      CANDIDATE:
      <candidate_text>

      EXISTING:
      <candidate_lines>

      Output JSON only with this schema:
      {"decision":"SAME"|"NEW","match_idx":<int or null>}

      Rules:
      - SAME when core event semantics match.
      - If uncertain, return NEW.

entity_profile_service:
  attribute_extract_prompt:
    zh: |
      你是信息抽取系统。
      请从一个 atomic fact 中抽取稳定的实体属性。
      如果没有稳定属性，返回空列表。

      Entity UID: <entity_uid>
      Entity Name: <main_entity>
      Atomic Fact: <atomic_fact>

      只输出 JSON：
      {"attributes":[{"field":"like","content":["apple","meat"]}]}

      规则：
      - 只返回一个 JSON 对象，不要返回数组。
      - `field` 尽量简洁，尽可能使用 lower-case snake_case 风格。
      - `content` 必须是字符串列表。
      - 只保留稳定的偏好、特征或能力。
    en: |
      You are an information extraction system.
      Extract stable profile attributes from one atomic fact.
      If there is no stable attribute, return an empty list.

      Entity UID: <entity_uid>
      Entity Name: <main_entity>
      Atomic Fact: <atomic_fact>

      Output JSON only:
      {"attributes":[{"field":"like","content":["apple","meat"]}]}

      Rules:
      - Return ONLY one JSON object. Do NOT return an array.
      - `field` should be concise, lower-case, snake_case style when possible.
      - `content` must be a list of strings.
      - Keep only stable preferences / traits / abilities.
  event_extract_prompt:
    zh: |
      你是信息抽取系统。
      请从一个 atomic fact 中抽取时间线事件。
      如果没有有效事件，返回空列表。

      Entity UID: <entity_uid>
      Entity Name: <main_entity>
      Atomic Fact: <atomic_fact>
      Known source time: start_time=<known_start>, end_time=<known_end>

      只输出 JSON：
      {"events":[{"event":"walk in the park","actual_time":[{"start_time":"...","end_time":"..."}],"abstract_time":["everyday"]}]}

      规则：
      - 只返回一个 JSON 对象，不要返回数组。
      - `event` 必须简洁而具体。
      - `actual_time` 在没有信息时可以是 []。
      - `abstract_time` 在没有信息时可以是 []。
    en: |
      You are an information extraction system.
      Extract timeline events from one atomic fact.
      If there is no valid event, return an empty list.

      Entity UID: <entity_uid>
      Entity Name: <main_entity>
      Atomic Fact: <atomic_fact>
      Known source time: start_time=<known_start>, end_time=<known_end>

      Output JSON only:
      {"events":[{"event":"walk in the park","actual_time":[{"start_time":"...","end_time":"..."}],"abstract_time":["everyday"]}]}

      Rules:
      - Return ONLY one JSON object. Do NOT return an array.
      - `event` must be concise and concrete.
      - `actual_time` can be [] when not available.
      - `abstract_time` can be [] when not available.
  summary_prompt:
    zh: |
      你是实体档案总结器。
      请用 2 到 4 句话写出简洁的档案摘要。
      重点关注稳定特征和关键的重复性事件。

      Entity: <entity_id>
      Attributes:
      <attr_lines>

      Events:
      <event_lines>

      只返回纯文本。
    en: |
      You are an entity profile summarizer.
      Write a concise profile summary in 2-4 sentences.
      Focus on stable traits and key recurring events.

      Entity: <entity_id>
      Attributes:
      <attr_lines>

      Events:
      <event_lines>

      Return plain text only.

entity_segment:
  step1_entities_prompt:
    zh: |
      你是实体识别器。给定一段「情景记忆文本」（segment 生成内容），列出其中出现的**不同现实世界对象**。
      每个对象只输出规范名称与类型；不要输出别名列表。

      允许的 entity_type 枚举（必须小写）：
      person, organization, location, product, event, other

      情景文本：
      <situation_text>

      只输出 JSON：
      {"entities":[{"canonical_name":"...","entity_type":"person"}]}

      规则：
      - 同一对象只出现一次；不要用代词作为 canonical_name。
      - 若没有实体，返回 {"entities":[]}。
    en: |
      You list distinct real-world objects mentioned in the situation memory text.
      For each object output only canonical_name and entity_type (no alias lists).

      Allowed entity_type values (lowercase):
      person, organization, location, product, event, other

      Situation text:
      <situation_text>

      Output JSON only:
      {"entities":[{"canonical_name":"...","entity_type":"person"}]}

      Rules:
      - Each real-world object appears once; canonical_name must not be a pronoun.
      - If none, return {"entities":[]}.
  step2_status_event_prompt:
    zh: |
      你是信息抽取器。给定情景文本与锚定实体，抽取**稳定状态**与**一条事件摘要**。

      情景文本：
      <situation_text>

      锚定实体 canonical_name=<entity_name> entity_type=<entity_type>

      只输出 JSON：
      {
        "statuses":[],
        "event_summary":"一句中文摘要：描述锚定实体在本段记忆中扮演的角色/经历/被提及方式"
      }

      规则：
      - 只抽取**情景文本中明确提到**且与锚定实体直接相关的稳定信息；不要为了“凑字段”而臆造内容。
      - 若文本中没有可抽取的稳定状态，statuses 必须为空列表 []。
      - statuses 为列表；每项仅含 field、update_mode（replace 或 append）、value（字符串数组）。
      - field 应简短、语义明确，优先使用通用字段名（如 occupation, location, age, relation, preference, skill 等）。
      - event_summary 必须写“锚定实体在本段情景记忆中的角色/经历/被提及方式”，哪怕只是被提到也要说明（例如“Japan 在讨论旅行计划时被提及”）。
      - 根据 entity_type 约束输出：
        - person：可输出 hobby/occupation/age/location/preference/skill 等（但仍需文本证据）。
        - location/organization/product/event/other：不要输出 hobby/age 等“人物属性”字段；仅输出与该类型匹配的客观属性（如 location 的 city/country，organization 的 industry/size，product 的 category/brand，event 的 date/place 等），且必须有文本证据。
      - 不要输出 evidence、时间戳、field_canonical、relation 列表等其它字段。

      输出样例（仅供格式参考；实际输出必须来自文本证据）：
      - 若锚定实体是 person 且文本明确提到其职业/偏好：
        {
          "statuses":[
            {"field":"occupation","update_mode":"replace","value":["software engineer"]},
            {"field":"preference","update_mode":"append","value":["likes hiking"]}
          ],
          "event_summary":"该人物在本段对话中介绍了自己的职业，并提到喜欢徒步。"
        }
      - 若锚定实体是 location（如 Japan）且文本只提到它被访问/提及但无稳定属性：
        {
          "statuses":[],
          "event_summary":"Japan 在本段关于旅行/地点的讨论中被提及。"
        }
    en: |
      Extract stable statuses and one short event summary for the anchored entity.

      Situation text:
      <situation_text>

      Anchored entity canonical_name=<entity_name> entity_type=<entity_type>

      Output JSON only:
      {
        "statuses":[],
        "event_summary":"One sentence describing the anchored entity's role/experience/how it is mentioned in this segment"
      }

      Rules:
      - Only extract stable information that is explicitly supported by the situation text and directly about the anchored entity. Do not fabricate fields/values just to fill slots.
      - If there is no stable status to extract, statuses must be an empty list [].
      - Each statuses entry contains only: field, update_mode (replace|append), value (array of strings).
      - Keep field short and semantically clear (e.g., occupation, location, age, relation, preference, skill).
      - event_summary must describe the anchored entity's role/experience/how it is mentioned in this segment; even if it is only mentioned, say so (e.g., \"Japan is mentioned in the travel discussion\"). Use empty string only if the entity truly does not appear in the text (rare).
      - Constrain by entity_type:
        - person: hobby/occupation/age/location/preference/skill are allowed (still require evidence).
        - location/organization/product/event/other: do NOT output person-only fields like hobby/age. Only output type-appropriate factual attributes (e.g., location: city/country; organization: industry; product: category/brand; event: date/place) with explicit evidence in text.
      - Do not output evidence, timestamps, field_canonical, relations, etc.

      Output examples (format only; must be supported by text evidence):
      - Person with explicit occupation/preference in text:
        {
          "statuses":[
            {"field":"occupation","update_mode":"replace","value":["software engineer"]},
            {"field":"preference","update_mode":"append","value":["likes hiking"]}
          ],
          "event_summary":"The person states their occupation and mentions enjoying hiking in this segment."
        }
      - Location mentioned without stable attributes:
        {
          "statuses":[],
          "event_summary":"Japan is mentioned in the travel/location discussion in this segment."
        }
  step_relations_prompt:
    zh: |
      你是关系抽取器。给定情景文本与实体列表（含 id），输出实体之间有依据的关系。

      情景文本：
      <situation_text>

      实体列表（每行 id | name | type）：
      <entity_lines>

      只输出 JSON：
      {"relations":[{"subject_id":"...","relation_type":"friend_of","object_id":"..."}]}

      规则：
      - subject_id / object_id 必须来自上表 id。
      - 没有关系则 {"relations":[]}。
      - relation_type 用小写 snake_case。
    en: |
      Extract supported binary relations between listed entities.

      Situation text:
      <situation_text>

      Entities (id | name | type per line):
      <entity_lines>

      Output JSON only:
      {"relations":[{"subject_id":"...","relation_type":"friend_of","object_id":"..."}]}

      Rules:
      - subject_id and object_id must be ids from the list.
      - relation_type in lower snake_case.
      - If none: {"relations":[]}.

entity_profile_retrieval:
  summary_confirm_prompt:
    zh: |
      你是检索确认器。判断是否应采用给定的实体档案摘要来回答查询。

      QUERY:
      <query>

      SUMMARY:
      <summary_text>

      只输出 JSON：{"decision":"USE"|"REJECT","reason":"..."}
      不确定则 REJECT。
    en: |
      Decide whether the provided entity profile summary is appropriate for the query.

      QUERY:
      <query>

      SUMMARY:
      <summary_text>

      Output JSON only: {"decision":"USE"|"REJECT","reason":"..."}
      If uncertain, REJECT.
  status_answer_prompt:
    zh: |
      你是问答助手。仅根据「召回的状态条目」回答问题；不要编造未出现的事实。
      在答案末尾用一行列出引用的 segment_ref 或 evidence（若有）。

      用户问题：
      <user_question>

      召回条目（JSON）：
      <recall_json>

      只输出简洁回答正文。
    en: |
      Answer using ONLY the recalled status rows; do not invent facts.
      End with one line citing segment_ref or evidence when present.

      User question:
      <user_question>

      Recalled rows (JSON):
      <recall_json>

      Output a concise plain-text answer.

entity_resolution:
  alias_then_embedding_llm_judge_prompt:
    zh: |
      请判断以下实体是否指向同一个现实对象。

      待判定实体：
      <source_entity_id>

      候选实体列表（已按相似度排序）：
      <candidate_text>

      请根据实体名称语义判断，待判定实体是否与某个候选实体指向同一个现实对象。
      如果是，请只返回对应的实体 ID。
      如果都不是，请只返回 `NEW_ENTITY`。

      除实体 ID 或 `NEW_ENTITY` 外，不要输出任何其他内容。
    en: |
      Decide whether the following source entity refers to the same real-world object as one of the candidate entities.

      Source entity:
      <source_entity_id>

      Candidate entity list (already sorted by similarity):
      <candidate_text>

      Judge by semantic meaning of the entity names.
      If the source matches one candidate, return only the matched entity ID.
      If none match, return only `NEW_ENTITY`.

      Do not output anything except a candidate entity ID or `NEW_ENTITY`.
