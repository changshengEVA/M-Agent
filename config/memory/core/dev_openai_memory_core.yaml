# Used by: `tests/test_core_sys.py` and ad-hoc local MemoryCore smoke tests.
# Purpose: developer-focused MemoryCore config with explicit OpenAI/alibaba model settings.
workflow_id: "test7"
runtime_prompt_config_path: "./runtime/memory_core_runtime.yaml"
prompt_language: "en"

# model providers
llm_provider: "openai"
embed_provider: "aliyun"

# optional model names (empty = loader defaults / env defaults)
llm_model_name: "gpt-4o-mini"
# Episode build LLM (Dialogue -> Episodes). If omitted, falls back to llm_provider/llm_model_name.
episode_llm_provider: "openai"
episode_llm_model_name: "gpt-4o-mini"
embed_model_name: "text-embedding-v4"

# MemoryCore init settings
memory_llm_temperature: 0.0
memory_similarity_threshold: 0.88
memory_top_k: 3
memory_use_threshold: true

# Build/import settings
scene_prompt_version: "v2"
fact_prompt_version: "v2"
memory_owner_name: "changshengEVA"
# true: only build to scene facts; skip extract_fact_entities/import_fact_entities
# and MemoryAgent will expose only search_content/search_events_by_time_range/search_details
facts_only_mode: false
# Entity statement build control
# true: force regenerate all episodes this run
# false: incremental mode based on episodes/episode_situation.json
entity_statement_force_update: true

# Hybrid detail retrieval tuning (search_details: dense + sparse BM25 + RRF)
detail_search_hybrid:
  dense_recall_topn: 30
  sparse_recall_topn: 30
  rrf_k: 60
  dense_weight: 1.0
  sparse_weight: 1.0
  bm25_k1: 1.5
  bm25_b: 0.75

detail_search_multi_route:
  enable: true
  route_count: 4
  query_generator: "llm"
  route_types: ["entity", "action", "time", "relation", "topic"]
  per_route_topk: 8
  fusion: "rrf"
  max_workers: 4
  rrf_k: 60
