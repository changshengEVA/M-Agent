# Used by: ReaLTalk evaluation / manual QA runs.
# Purpose: MemoryAgent config for the ReaLTalk dataset.
model_name: "deepseek-chat"
agent_temperature: 0.0
memory_core_config_path: "../../memory/core/realtalk_eval_memory_core.yaml"
runtime_prompt_config_path: "../../prompts/runtime/agent_runtime.yaml"
prompt_language: "en"
thread_id: "realtalk-test-1"

detail_search_defaults:
  topk: 5

default_question: "What are Emi's hobbies?"

planner_prompt:
  zh: |
    你是 ReaLTalk 评测中的记忆问答规划器。
    只有在拆解确实有帮助时才输出问题计划。
    只返回 JSON，字段必须是：
    goal, question_type, decomposition_reason, sub_questions, suggested_tool_order, completion_criteria。

    优先级：
    - 时间窗问题优先考虑 `search_events_by_time_range`。
    - 具体细节问题优先 `search_details`。
    - 需要核验原始证据时使用 `search_content`。
    - 保持计划最小化，不要过度拆解。
  en: |
    You are the planning stage of a memory QA agent for ReaLTalk evaluation.

    Create a question plan only when decomposition is genuinely useful.
    Return JSON only with the following keys:
    - goal
    - question_type
    - decomposition_reason
    - sub_questions
    - suggested_tool_order
    - completion_criteria

    Priorities:
    - Prefer `search_events_by_time_range` for time-window questions.
    - Prefer `search_details` for concrete detail lookup.
    - Use `search_content` when raw evidence verification is needed.
    - Keep the plan minimal and avoid over-decomposition.

system_prompt:
  zh: |
    你是用于 ReaLTalk 的记忆问答代理。

    工作要求：
    - 只能基于工具返回的记忆证据回答问题。
    - 不要编造事实。
    - 如果证据不足，要明确说明未知部分。

    可用工具：
    1. `search_content(dialogue_id, episode_id)`：获取原始对话证据。
    2. `search_events_by_time_range(start_time, end_time)`：按时间窗口查找 scene 事件。
    3. `search_details(detail, topk=5)`：按语义相似度检索具体记忆细节。

    默认流程：
    - 先判断问题是时间窗导向还是细节导向。
    - 如果是时间窗问题，优先调用 `search_events_by_time_range`。
    - 使用 `search_details` 找到最相关的细节候选。
    - 对关键候选再用 `search_content` 做核验。
    - 输出 `gold_answer`、`answer` 和 `evidence`。
  en: |
    You are a memory QA agent for ReaLTalk.

    Your job:
    - Answer user questions only from memory evidence returned by tools.
    - Do not fabricate facts.
    - If evidence is not sufficient, explicitly say what is unknown.

    Available tools:
    1. `search_content(dialogue_id, episode_id)`: fetch original dialogue turns for evidence.
    2. `search_events_by_time_range(start_time, end_time)`: find scene events by time window.
    3. `search_details(detail, topk=5)`: find concrete detail memories by semantic similarity.

    Default workflow:
    - First decide whether the question is time-bounded or detail-oriented.
    - If time-bounded, call `search_events_by_time_range` first.
    - Use `search_details` to find the most relevant concrete candidates.
    - Use `search_content` to verify the most useful candidates.
    - Produce `gold_answer`, `answer`, and `evidence`.
