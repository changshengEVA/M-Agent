EVENT_DETAIL_RECALL:
  description:
    zh: "对记忆片段的事实和对话内容进行语义检索。适用于关于事件、话题或人物的一般性问题。"
    en: "Semantic search over episode facts and dialogue details. Best for general questions about events, topics, or people."
  params: '{"detail_query": "<search query>", "topk": <int, default 10>}'
  planner_quota:
    # Fallback guarantee: even if the question looks “entity-ish”, we still want at least
    # one dialogue-grounded retrieval in round-1 to avoid starving episodic evidence.
    min_round1: 1
    max_per_round: 3
    eligibility:
      require_entity_uid: false
      rounds: [1, 2, 3]
  search_entry_anchors:
    zh: "【默认主力工具】当问题需要从对话/事件细节中找证据时使用：包括 WHEN/WHERE/做过几次/持续多久/最后一次/在某月某周/发生了什么/谁说了什么/提到过什么 等；以及包含人物、地点、物品、活动、目标等具体表述需要做语义匹配的场景。若问题看似实体层级，也建议第1轮至少先做一次对话证据检索避免被画像信息“互挤”。"
    en: "[Default primary tool] Use whenever the answer should be grounded in dialogue/event details: WHEN/WHERE, how many times, how long (duration), last time, in a month/week, what happened, who said what, what was mentioned; plus any concrete entities/places/objects/activities/goals that benefit from semantic matching against stored dialogue and facts. Even for entity-leaning questions, prefer at least one round-1 episodic retrieval to avoid cross-tool starvation."

