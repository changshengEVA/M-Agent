EVENT_DETAIL_RECALL:
  description:
    zh: "对记忆片段的事实和对话内容进行语义检索。适用于关于事件、话题或人物的一般性问题。"
    en: "Semantic search over episode facts and dialogue details. Best for general questions about events, topics, or people."
  params: '{"detail_query": "<search query>", "topk": <int, default 10>}'
  search_entry_anchors:
    zh: "当原始问题或当前检索查询暴露出语义入口时选用：包括问题本身整句，以及人物/实体、主题、活动、物品、地点、目标或需要从对话与事实中匹配的任何具体表述。"
    en: "Use when the original question or current retrieval query exposes semantic entry points—including the full question text itself—as well as entities, topics, activities, objects, places, goals, or any concrete wording that should be matched against stored dialogue and facts."

EVENT_TIME_RECALL:
  description:
    zh: "按日期/时间范围检索事件。当问题涉及具体日期或时间段时使用。"
    en: "Retrieve events within a specific date/time range. Use when the question mentions dates or time periods."
  params: '{"start_time": "<ISO date>", "end_time": "<ISO date>"}'
  search_entry_anchors:
    zh: "当问题暴露出时间入口时选用：明确日期、可映射为起止时间的月份/季节/周、相对时间窗，或需要按时间范围过滤事件的表述。"
    en: "Use when the question exposes a time entry point—explicit dates, month/season/week phrases you can map to start_time/end_time, relative windows, or any need to filter events by a bounded time range."

ENTITY_PROFILE_SEARCH:
  description:
    zh: "按实体 UID 获取档案摘要；可选查询句用于相似度过滤与 LLM 确认。"
    en: "Fetch entity profile summary by UID; optional query triggers similarity filter + LLM confirmation."
  params: '{"entity_uid":"<id>","optional_query":"<optional semantic check>"}'
  search_entry_anchors:
    zh: "当问题已绑定具体实体 UID 或需要从结构化档案摘要核对事实时。"
    en: "When the question is anchored to a concrete entity UID or needs checking against a structured profile summary."

ENTITY_STATUS_QA:
  description:
    zh: "给定实体 UID 与字段语义（yield），对状态槽位做向量召回并由模型生成简短回答。"
    en: "Vector recall over status slots for an entity plus a short grounded answer."
  params: '{"entity_uid":"<id>","field_yield":"<field or paraphrase>","user_question":"<question>","topk":3}'
  search_entry_anchors:
    zh: "当问题询问某实体的具体属性/偏好/状态且已知 UID 时。"
    en: "When the question asks for a specific attribute/preference/state of a known entity UID."

RECALL_REMEDY_MULTI_ROUTE:
  description:
    zh: "多路召回补救措施。当 EVENT_DETAIL_RECALL 已经被调用过一次但工作区仍 INSUFFICIENT 时，应立即使用此工具进行多路扩展召回（按 entity / action / time / relation / topic 五个路由并行检索并融合结果）。"
    en: "Broad multi-route recall (parallel queries via entity/action/time/relation/topic routes, RRF-fused). Use whenever EVENT_DETAIL_RECALL has already been called once and the workspace is still INSUFFICIENT — escalate aggressively rather than repeating EVENT_DETAIL_RECALL with paraphrased queries."
  params: '{"detail_query": "<search query>", "topk": <int, default 10>}'
  search_entry_anchors:
    zh: "用于第二轮及以后；当前一轮 EVENT_DETAIL_RECALL 命中不足或工作区被判 INSUFFICIENT 时优先选用，避免重复同义改写仍然检索失败。"
    en: "Use from round 2 onward whenever EVENT_DETAIL_RECALL underperformed (low hits, or workspace judged INSUFFICIENT). Preferred over yet another paraphrase of EVENT_DETAIL_RECALL — multi-route already covers synonym/relation expansions."
