# Used by: `python scripts/run_longmemeval/run_eval_longmemeval.py` / `eval_longmemeval.py`
# Purpose: default MemoryAgent config for LongMemEval evaluation (parallel to locomo_eval_memory_agent.yaml).
#
# model_name (可选示例): 同 locomo_eval_memory_agent.yaml — gpt-* / o1* / o3* / o4* → openai:...；
#   密钥/代理与 OpenAIcall 一致：优先 API_SECRET_KEY，否则 OPENAI_API_KEY；BASE_URL 会同步给 LangChain（OPENAI_BASE_URL）。
model_name: "gpt-4.1-mini"
# model_name: "deepseek-chat"
agent_temperature: 0.0
memory_core_config_path: "../../memory/core/longmemeval_eval_memory_core.yaml"
runtime_prompt_config_path: "./runtime/agent_runtime_facts_only.yaml"
prompt_language: "en"
recursion_limit: 60
retry_recursion_limit: 120
model_timeout_seconds: 180
model_max_retries: 2
network_retry_attempts: 4
network_retry_backoff_seconds: 2.0
network_retry_backoff_multiplier: 2.0
network_retry_max_backoff_seconds: 20.0

auto_bootstrap_kg_data: true

detail_search_defaults:
  topk: 10
workspace:
  enable_state_machine: true
  max_rounds: 3
  max_actions_per_round: 5
  max_episode_candidates: 16
  max_keep: 8
  min_evidence_to_answer: 1
  remedy_recall_max_times: 1
  action_planner: "llm"
  # LLM planner only: retry then RuntimeError (no rule-based fallback).
  action_planner_max_attempts: 3
  enabled_tools:
    - EVENT_DETAIL_RECALL
    # - EVENT_TIME_RECALL
    - RECALL_REMEDY_MULTI_ROUTE
  rerank:
    # enable: false 可关闭重排。
    # model_name 可选 qwen3-rerank / gte-rerank-v2 等；qwen3 无 SDK 时见 ALIBABA_RERANK_COMPAT_URL。
    enable: true
    provider: "aliyun"
    model_name: "qwen3-rerank"
    score_threshold: 0.1
    max_documents: 16
    chunk_chars: 800
    chunk_batch_size: 32
attach_episode_refs_to_answer: true
evidence_episode_ref_max_in_text: 8

default_question: "What did the user discuss in the conversation?"
