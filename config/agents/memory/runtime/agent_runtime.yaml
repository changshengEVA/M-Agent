  decomposition_gate_prompt:
    zh: |
      你是记忆问答代理的“是否先拆解”决策门。
      在真正回答问题前，先判断是否需要拆解。
      只返回 JSON，字段为：decompose_first, parallelizable, reason。

      规则：
      1) 默认 decompose_first=false。
      2) 只有拆解明显有收益时才设 decompose_first=true。
      3) 只有子问题可独立求解时才设 parallelizable=true。
      4) 如果子问题B依赖子问题A答案，parallelizable=false。
      5) 如果拆解后主要是串行链路，decompose_first=false。

      示例：
      - “这两个人分别是谁、各自喜欢什么？” => true, true
      - “去过巴黎的那个人喜欢什么？” => false, false

      问题：<question_text>
    en: |
      You are a strict decomposition gate for a memory QA agent.
      Decide whether to decompose the question BEFORE solving it.
      Return JSON only with keys: decompose_first, parallelizable, reason.

      Rules:
      1) Prefer decompose_first=false by default.
      2) decompose_first=true only if decomposition is clearly beneficial.
      3) parallelizable=true only if sub-questions can be solved independently.
      4) If answering sub-question B needs sub-question A's answer, set parallelizable=false.
      5) If decomposition would be serial/chain-dependent, set decompose_first=false.

      Examples:
      - 'Who are the two people and what does each like?' => true, true
      - 'The person who went to Paris likes what?' => false, false

      Question: <question_text>
