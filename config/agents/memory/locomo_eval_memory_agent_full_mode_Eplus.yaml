# E+ (full_mode + entity tools ON + stricter entityâ†’workspace gating in action_executor).
# Use with conv-48 ablation vs E0 (__baseline_prompt) and Eâˆ’ (E2 yaml).
#
# Gating (entity_workspace_mode: eplus):
# - ENTITY_PROFILE_SEARCH: if optional_query is empty, do not inject profile summary into workspace.
# - ENTITY_STATUS_QA: require top attribute slot score >= 0.44 to merge episodic refs / inject status answer.
# - Execution: ENTITY_PROFILE / ENTITY_STATUS run after episodic tools in the same round.
# - Workspace: entity_profile / entity_status text cards compete with episodic evidence in keep_top
#   like any other source (defer_keep_source_types empty).

model_name: "gpt-4.1-mini"
agent_temperature: 0.0
memory_core_config_path: "../../memory/core/locomo_eval_memory_core_full_mode.yaml"
runtime_prompt_config_path: "./runtime/agent_runtime_facts_only__baseline.yaml"
prompt_language: "en"
recursion_limit: 60
retry_recursion_limit: 120
model_timeout_seconds: 180
model_max_retries: 2
network_retry_attempts: 4
network_retry_backoff_seconds: 2.0
network_retry_backoff_multiplier: 2.0
network_retry_max_backoff_seconds: 20.0

auto_bootstrap_kg_data: true

detail_search_defaults:
  topk: 10
workspace:
  enable_state_machine: true
  max_rounds: 3
  max_actions_per_round: 5
  max_episode_candidates: 16
  max_keep: 8
  min_evidence_to_answer: 1
  remedy_recall_max_times: 1
  action_planner: "llm"
  action_planner_max_attempts: 3
  entity_workspace_mode: "eplus"
  entity_eplus_min_slot_score: 0.44
  entity_eplus_suppress_empty_profile_query: true
  # Empty: entity cards are not deferred in keep_top (same rerank/recall ordering as other types).
  defer_keep_source_types: []
  enabled_tools:
    - EVENT_DETAIL_RECALL
    - RECALL_REMEDY_MULTI_ROUTE
    - ENTITY_PROFILE_SEARCH
    - ENTITY_STATUS_QA
  rerank:
    enable: true
    provider: "aliyun"
    model_name: "qwen3-rerank"
    score_threshold: 0.1
    max_documents: 16
    chunk_chars: 800
    chunk_batch_size: 32
    # Network resilience for DashScope rerank (esp. HTTP fallback via urllib).
    retry_attempts: 6
    retry_backoff_seconds: 2.0
    retry_backoff_multiplier: 2.0
    request_timeout_seconds: 90.0
attach_episode_refs_to_answer: true
evidence_episode_ref_max_in_text: 8

default_question: "What are Emi's hobbies?"
